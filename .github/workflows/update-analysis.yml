# 개오 애널리스트팀 — 분석용 데이터 자동 수집(무거운 워크플로우)
# 목적: 일별 종가·분석원천·사전계산지표·자동분석을 생성한다. 이들은 시세(data.js)와
#       달리 자주 바뀔 필요가 없고 수집이 무거워(수분~십수분) 10분 간격에 맞지 않는다.
#       → 시세(update-prices.yml, 10분)와 분리해 30분 간격으로 돌린다.
# 생성물: price_history.js · analysis_data.json · indicators.json · indicators.js ·
#         auto_analysis.js · guestbook_backup.json · krx_list.json
name: update-analysis

on:
  workflow_dispatch:
  push:
    paths:
      - ".analyst-refresh"
      - ".github/workflows/update-analysis.yml"
  schedule:
    # 평일 09~15시 KST, 30분 간격(:05, :35) — 정각/시세 스케줄과 안 겹치게 오프셋
    - cron: "5,35 0-5 * * 1-5"
    # 마감 후 15:35 KST 한 번 더(종가 확정분 반영)
    - cron: "35 6 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-analysis-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 각 단계는 하나가 실패해도 나머지·커밋을 막지 않도록 continue-on-error.
      - name: 일별 종가 기록 (price_history.js)
        continue-on-error: true
        run: python3 update_price_history.py

      - name: 분석용 원천 데이터 (analysis_data.json)
        continue-on-error: true
        run: python3 collect_analyst_data.py

      - name: 지표 사전계산 (indicators.json)
        continue-on-error: true
        run: python3 compute_indicators.py

      - name: 자동분석 생성 (auto_analysis.js · Claude 토큰 0)
        continue-on-error: true
        run: python3 analyze_auto.py

      - name: 방문자 게시판 개설·백업 (guestbook · kvdb.io)
        continue-on-error: true
        run: |
          # 구버전(jsonblob)은 브라우저 CORS 미지원 + 24시간 만료라 kvdb.io로 교체
          if [ -f guestbook_id.json ] && grep -q jsonblob guestbook_id.json; then
            rm -f guestbook_id.json guestbook_backup.json
            echo "구버전(jsonblob) 저장소 폐기 — kvdb로 재개설"
          fi
          # 최초 1회: kvdb.io 버킷 개설 → 주소를 guestbook_id.json에 기록
          if [ ! -f guestbook_id.json ]; then
            BK=$(curl -s -X POST https://kvdb.io -d 'email=gaeo-guestbook@example.com')
            if echo "$BK" | grep -qE '^[A-Za-z0-9]{10,40}$'; then
              printf '{"url":"https://kvdb.io/%s"}\n' "$BK" > guestbook_id.json
              echo "게시판 저장소(kvdb) 개설: $BK"
            else
              echo "게시판 저장소 개설 실패($BK) — 다음 실행에서 재시도"
            fi
          fi
          # 매 실행: 게시판 전체를 백업 (주기적 접근이 버킷 만료 방지도 겸함)
          if [ -f guestbook_id.json ]; then
            base=$(python3 -c "import json;print(json.load(open('guestbook_id.json'))['url'])")
            curl -s "$base/?values=true&format=json" -o /tmp/gb.json || true
            if python3 -c "import json;d=json.load(open('/tmp/gb.json'));assert isinstance(d,list)" 2>/dev/null; then
              cp /tmp/gb.json guestbook_backup.json
            fi
          fi

      - name: 상장사 목록 갱신 (krx_list.json · 주 1회)
        continue-on-error: true
        run: |
          # 관리자 모드 '이름으로 종목 추가' 자동완성용 — 없거나 7일 넘게 오래되면 갱신
          if [ ! -f krx_list.json ] || [ -n "$(find krx_list.json -mtime +7 2>/dev/null)" ]; then
            python3 fetch_krx_list.py
          fi

      - name: 결과 커밋 & 푸시
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 존재하지 않는/gitignore 걸린 파일 add 실패가 job을 못 죽이게 '|| true'.
          for f in price_history.js analysis_data.json indicators.json indicators.js auto_analysis.js guestbook_id.json guestbook_backup.json krx_list.json; do
            [ -f "$f" ] && { git add "$f" || true; }
          done
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "자동 분석데이터 갱신 (GitHub Actions) [skip ci]"
            for i in 1 2 3; do
              git push && break
              echo "push 거부 — 원격 반영 후 재시도 ($i/3)"
              git pull --rebase origin "${{ github.ref_name }}"
              sleep 3
            done
          fi
