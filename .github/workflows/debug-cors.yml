# 임시 진단용 — 게시판 저장소(jsonblob)의 브라우저 접근(CORS) 가능 여부 확인 후 삭제 예정
name: debug-cors
on:
  push:
    paths: [".github/workflows/debug-cors.yml"]
jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - name: CORS headers check
        run: |
          url="https://jsonblob.com/api/jsonBlob/019f49a2-fea3-78c7-b042-606b4ead8708"
          echo "===== 1) GET + Origin (브라우저 읽기 시뮬레이션) ====="
          curl -sD - -o /tmp/body -H "Origin: https://rudvh1016-gif.github.io" -H "Accept: application/json" "$url" | tr -d '\r'
          echo "----- body -----"; head -c 300 /tmp/body; echo
          echo "===== 2) OPTIONS preflight (브라우저 쓰기 사전요청) ====="
          curl -sD - -o /dev/null -X OPTIONS \
            -H "Origin: https://rudvh1016-gif.github.io" \
            -H "Access-Control-Request-Method: PUT" \
            -H "Access-Control-Request-Headers: content-type" "$url" | tr -d '\r'
          echo "===== 3) GET without Accept ====="
          curl -sD - -o /dev/null "$url" | tr -d '\r' | head -20
