# 임시 디버그: 환율 수집(fetch_fx)만 빠르게 실행해 로그로 확인 (검증 후 삭제 예정)
name: fx-debug
on:
  push:
    paths:
      - ".github/workflows/fx-debug.yml"
      - "update_prices.py"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  fx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 환율 수집 테스트
        run: |
          python3 - <<'PY'
          import update_prices as u
          print("fetch_fx() =>", u.fetch_fx())
          # 원자료 일부도 출력(파싱 디버그용)
          try:
              h = u.get_html('https://finance.naver.com/marketindex/exchangeList.naver')
              import re
              i = h.find('미국')
              print("샘플(미국 주변 400자):", h[i:i+400].replace('\n',' '))
          except Exception as e:
              print("샘플 실패:", e)
          PY
