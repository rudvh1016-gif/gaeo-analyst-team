# 개오 애널리스트팀 — 시세·분석데이터 자동 수집 워크플로우
# 목적: 네트워크가 제한된 원격 Claude Code 세션(모바일/웹)에서도 정확한
#       네이버 금융 시세를 쓸 수 있도록, 네트워크 제한이 없는 GitHub 러너에서
#       update_prices.py / update_price_history.py / collect_analyst_data.py 를
#       실행해 결과(data.js, price_history.js, analysis_data.json)를 커밋한다.
# 실행 방법:
#   · 수동: GitHub → Actions → 이 워크플로우 → Run workflow
#   · 마커: .analyst-refresh 파일 내용을 바꿔 push (원격 세션에서 쓰는 방법)
#   · 자동: 평일 장중 30분 간격 (KST 09:30~15:30)
name: update-prices

on:
  workflow_dispatch:
  push:
    paths:
      - ".analyst-refresh"
      - ".github/workflows/update-prices.yml"
  schedule:
    # KST = UTC+9. 평일 00:30~06:30 UTC = 09:30~15:30 KST, 30분 간격
    - cron: "0,30 0-6 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-prices-${{ github.ref }}
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 시세 수집 (data.js)
        run: python3 update_prices.py

      - name: 일별 종가 기록 (price_history.js)
        run: python3 update_price_history.py

      - name: 분석용 원천 데이터 (analysis_data.json)
        run: python3 collect_analyst_data.py

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 존재하지 않는 파일이 섞이면 git add 전체가 무효화되므로 개별 add
          for f in data.js price_history.js analysis_data.json update.log; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "자동 시세 갱신 (GitHub Actions) [skip ci]"
            git push
          fi
