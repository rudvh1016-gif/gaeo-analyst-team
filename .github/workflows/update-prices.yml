# 개오 애널리스트팀 — 시세·환율 자동 수집 (자가 반복/loop 방식)
# 왜 loop인가:
#   GitHub 무료 스케줄(cron)은 이 저장소에서 사실상 거의 안 켜진다(실측: 전체 기간
#   schedule 이벤트 단 2회). "10분마다"를 cron에 맡기면 며칠씩 멈춘다.
#   → 한 번 시작되면 그 실행 안에서 스스로 10분마다 반복해 장 마감(KST 15:42)까지
#     시세를 갱신한다. 수집은 병렬화돼 한 사이클이 ~1분이라 여유롭다.
# 시작 방법(아무거나 하나면 하루 종일 돔):
#   · 수동: GitHub → Actions → update-prices → Run workflow
#   · 마커: .analyst-refresh 를 바꿔 push
#   · 스케줄: 개장 직후 자주 시도(누락 대비) + 낮 동안 재기동 안전망(best-effort)
name: update-prices

on:
  workflow_dispatch:
  push:
    paths:
      - ".analyst-refresh"
      - ".github/workflows/update-prices.yml"
  schedule:
    # 개장(09:00 KST=00:00 UTC) 직후 3분 간격으로 여러 번 시도 → 하루 한 번은 루프 기동
    - cron: "0-33/3 0 * * 1-5"
    # 낮 동안(10~15시 KST) 재기동 안전망: 루프가 죽었으면 다시 띄운다
    - cron: "5,35 1-5 * * 1-5"

permissions:
  contents: write

concurrency:
  # 새 기동이 들어오면 낡은 루프를 취소하고 최신 하나만 유지(중복 루프 방지)
  group: update-prices-${{ github.ref }}
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 350        # GitHub 잡 최대 6시간 안쪽 안전 상한
    env:
      TZ: Asia/Seoul
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 시세·환율 반복 수집 (장중 10분 간격, 개장 대기 + 마감까지)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 개장(09:00)·마감+종가확정(15:42) KST 기준.
          open=$(date -d "08:58" +%s)
          close=$(date -d "15:42" +%s)
          now=$(date +%s)
          # GitHub cron은 예약보다 수 시간 늦게 켜지는 일이 잦다. 그래서 개장 전에
          # 깨어났으면 개장까지 대기(최대 3시간)했다가 장중부터 돈다.
          if [ "$now" -lt "$open" ]; then
            wait=$((open - now))
            if [ "$wait" -le 10800 ]; then
              echo "개장 전 기동 — ${wait}s 대기 후 장중 수집 시작"
              sleep "$wait"
            fi
          fi
          # GitHub 잡은 최대 6시간이라 09:00~15:42(6h42m)를 한 잡으로 못 채운다.
          # 시작+330분과 마감(15:42) 중 이른 시각까지만 돌고 종료(나머지는 정오
          # 재기동 또는 재기동 cron이 이어받는다 → 마감까지 갭 없이 커버).
          hard=$(( $(date +%s) + 330*60 ))
          limit=$close; [ "$hard" -lt "$limit" ] && limit=$hard
          while :; do
            python3 update_prices.py || echo "수집 실패/변동없음 — 이번 사이클 건너뜀"
            [ -f data.js ] && { git add data.js || true; }
            if git diff --cached --quiet; then
              echo "변경 없음 — 커밋 생략"
            else
              git commit -m "자동 시세 갱신 (GitHub Actions) [skip ci]"
              for i in 1 2 3; do
                git push && break
                echo "push 거부 — 원격 반영 후 재시도 ($i/3)"
                git pull --rebase origin "${{ github.ref_name }}"
                sleep 3
              done
            fi
            now=$(date +%s)
            if [ "$now" -ge "$limit" ]; then
              echo "마감/6시간 상한 도달 — 루프 종료"
              break
            fi
            echo "다음 갱신까지 10분 대기…"
            sleep 600
          done
