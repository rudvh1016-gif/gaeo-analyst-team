# 임시 점검용 v2 — 카운터 트레일링 슬래시 + kvdb 삭제 지연 확인 후 삭제 예정
name: healthcheck
on:
  push:
    paths: [".github/workflows/healthcheck.yml"]
jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - name: v2 check
        run: |
          O="Origin: https://rudvh1016-gif.github.io"
          echo "===== 1a) counterapi GET 끝슬래시 ====="
          curl -sD - -o /tmp/c -H "$O" "https://api.counterapi.dev/v1/rudvh1016-gif-gaeo/site-visits/" | tr -d '\r' | grep -iE "^HTTP|access-control|content-type" || true
          echo "-- body:"; head -c 200 /tmp/c; echo
          echo "===== 1b) counterapi /up (기존 코드 형태) ====="
          curl -sD - -o /tmp/c2 -H "$O" "https://api.counterapi.dev/v1/rudvh1016-gif-gaeo/site-visits/up" | tr -d '\r' | grep -iE "^HTTP|access-control|content-type|location" || true
          echo "-- body:"; head -c 200 /tmp/c2; echo
          echo "===== 2) kvdb 삭제 재검증 (삭제→3초 대기→캐시버스터 목록) ====="
          B="https://kvdb.io/KaeHHrQpPJzMyyCaKCdD2b"
          curl -sD - -o /dev/null -X DELETE "$B/post:selftest" -H "$O" | tr -d '\r' | grep -iE "^HTTP" || true
          curl -sD - -o /dev/null -X DELETE "$B/guestbook" -H "$O" | tr -d '\r' | grep -iE "^HTTP" || true
          sleep 3
          echo "-- 3초 후 목록:"; curl -s "$B/?values=true&format=json&t=$(date +%s)" | head -c 300; echo
          echo "-- 개별 키 조회:"; curl -s -o /dev/null -w "%{http_code}" "$B/post:selftest?t=$(date +%s)"; echo